name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Debug environment
        run: |
          echo "Database ID length: ${#CLOUDFLARE_D1_DATABASE_ID}"
          echo "Database ID (first 8 chars): ${CLOUDFLARE_D1_DATABASE_ID:0:8}"
          if [ -z "$CLOUDFLARE_D1_DATABASE_ID" ]; then
            echo "ERROR: CLOUDFLARE_D1_DATABASE_ID is empty!"
            exit 1
          fi
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      - name: Prepare production config
        run: |
          python3 <<'EOF'
import os
import re

db_id = os.environ.get('CLOUDFLARE_D1_DATABASE_ID', '').strip()
print(f'Python sees DB ID length: {len(db_id)}')
print(f'DB ID empty: {not db_id}')

if not db_id:
    print('ERROR: CLOUDFLARE_D1_DATABASE_ID is not set')
    exit(1)

with open('wrangler.toml', 'r') as f:
    config = f.read()
    print(f'Original config length: {len(config)}')

config = re.sub(r'database_id = "[^"]*"', f'database_id = "{db_id}"', config)

with open('wrangler.toml', 'w') as f:
    f.write(config)

print(f'✓ Updated database_id to: {db_id[:8]}...')
EOF
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
