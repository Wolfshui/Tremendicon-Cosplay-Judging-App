name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare production config
        run: |
          python3 <<'EOF'
import os
import re

db_id = os.environ.get('CLOUDFLARE_D1_DATABASE_ID', '').strip()
if not db_id:
    print('ERROR: CLOUDFLARE_D1_DATABASE_ID is not set')
    exit(1)

with open('wrangler.toml', 'r') as f:
    config = f.read()

config = re.sub(r'database_id = "[^"]*"', f'database_id = "{db_id}"', config)

with open('wrangler.toml', 'w') as f:
    f.write(config)

print(f'✓ Updated database_id')
EOF
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
